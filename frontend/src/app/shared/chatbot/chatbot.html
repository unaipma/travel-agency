<div class="fixed bottom-6 right-6 z-50 flex flex-col items-end">
  <!-- Ventana del Chat -->
  @if (isOpen()) {
    <div class="mb-4 w-80 sm:w-96 h-[500px] bg-white rounded-2xl shadow-2xl border border-gray-100 flex flex-col overflow-hidden animate-in fade-in slide-in-from-bottom-4 duration-300">
      <!-- Cabecera -->
      <div class="p-4 bg-blue-700 text-white flex items-center justify-between">
        <div class="flex items-center gap-3">
          <div class="w-8 h-8 bg-blue-500 rounded-full flex items-center justify-center">
            <span class="text-lg">🤖</span>
          </div>
          <div>
            <h3 class="font-bold text-sm">Asistente Triptoyou</h3>
            <p class="text-[10px] text-blue-100">En línea ahora</p>
          </div>
        </div>
        <button (click)="toggleChat()" class="p-1 hover:bg-blue-600 rounded-lg transition-colors">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>
      </div>

      <!-- Cuerpo / Mensajes -->
      <div class="flex-1 overflow-y-auto p-4 space-y-4 bg-gray-50" #scrollContainer>
        @for (msg of messages(); track $index) {
          <div [class.flex-row-reverse]="msg.role === 'user'" class="flex items-start gap-2">
            <div [class.bg-blue-700]="msg.role === 'user'" 
                 [class.text-white]="msg.role === 'user'"
                 [class.bg-white]="msg.role === 'model'"
                 [class.text-gray-800]="msg.role === 'model'"
                 [class.border]="msg.role === 'model'"
                 class="max-w-[80%] p-3 rounded-2xl text-sm shadow-sm">
              {{ msg.text }}
            </div>
          </div>
        }
        @if (isLoading()) {
          <div class="flex items-start gap-2">
            <div class="bg-white border p-3 rounded-2xl shadow-sm">
              <div class="flex gap-1">
                <div class="w-1.5 h-1.5 bg-gray-300 rounded-full animate-bounce"></div>
                <div class="w-1.5 h-1.5 bg-gray-300 rounded-full animate-bounce delay-75"></div>
                <div class="w-1.5 h-1.5 bg-gray-300 rounded-full animate-bounce delay-150"></div>
              </div>
            </div>
          </div>
        }
      </div>

      <!-- Input -->
      <form (ngSubmit)="sendMessage()" class="p-4 border-t bg-white flex gap-2">
        <input 
          type="text" 
          [(ngModel)]="currentInput" 
          name="currentInput"
          placeholder="Escribe tu duda..."
          class="flex-1 bg-gray-100 border-none rounded-xl px-4 py-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none"
          [disabled]="isLoading()"
        />
        <button 
          type="submit" 
          [disabled]="isLoading() || !currentInput.trim()"
          class="bg-blue-700 text-white p-2 rounded-xl hover:bg-blue-800 transition-colors disabled:opacity-50"
        >
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" viewBox="0 0 20 20" fill="currentColor">
            <path d="M10.894 2.553a1 1 0 00-1.788 0l-7 14a1 1 0 001.169 1.409l5-1.429A1 1 0 009 15.571V11a1 1 0 112 0v4.571a1 1 0 00.725.962l5 1.428a1 1 0 001.17-1.408l-7-14z" />
          </svg>
        </button>
      </form>
    </div>
  }

  <!-- Botón Burbuja -->
  <button (click)="toggleChat()" 
          class="w-14 h-14 bg-blue-700 text-white rounded-full shadow-2xl flex items-center justify-center hover:scale-110 transition-transform active:scale-95 group">
    @if (isOpen()) {
      <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
      </svg>
    } @else {
      <div class="relative">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z" />
        </svg>
        <div class="absolute -top-1 -right-1 w-3 h-3 bg-red-500 rounded-full border-2 border-blue-700 animate-pulse"></div>
      </div>
    }
  </button>
</div>
