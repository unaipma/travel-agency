<nav class="fixed w-full z-[100] transition-all duration-500 bg-white/90 dark:bg-zinc-950/80 backdrop-blur-md border-b border-gray-100 dark:border-zinc-800 font-sans">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex justify-between h-16">
      <div class="flex items-center">
        <a routerLink="/" class="flex-shrink-0 flex items-center gap-3 group">
          
          <span
            class="font-extrabold text-2xl text-blue-800 dark:text-blue-400 tracking-tight transition-colors group-hover:text-blue-600 dark:group-hover:text-blue-300"
            >triptoyou</span
          >
        </a>

        <div class="hidden md:ml-10 md:flex md:space-x-1">
          <a
            routerLink="/trips"
            routerLinkActive="bg-gray-50 dark:bg-zinc-900 text-blue-700 dark:text-blue-400"
            class="text-gray-600 dark:text-zinc-400 hover:bg-gray-50 dark:hover:bg-zinc-900 hover:text-gray-900 dark:hover:text-zinc-100 px-3 py-2 rounded-md text-sm font-medium transition-colors"
          >
            Catálogo
          </a>
        </div>
      </div>

      <div class="flex items-center space-x-4">
        <!-- Theme Toggle -->
        <button
          (click)="themeService.toggleTheme()"
          class="p-2 rounded-xl bg-gray-100 dark:bg-zinc-800 text-gray-600 dark:text-zinc-400 hover:bg-gray-200 dark:hover:bg-zinc-700 hover:text-blue-600 dark:hover:text-blue-400 transition-all duration-300 shadow-inner"
          [title]="themeService.isDarkMode() ? 'Modo Claro' : 'Modo Oscuro'"
        >
          @if (themeService.isDarkMode()) {
            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707M16.243 17.657l.707.707M7.757 6.343l.707.707M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
            </svg>
          } @else {
            <svg xmlns="http://www.w3.org/2000/svg" class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
            </svg>
          }
        </button>

        @if (!authService.currentUser()) {
          <a
            routerLink="/login"
            class="text-gray-600 dark:text-zinc-400 hover:text-gray-900 dark:hover:text-zinc-100 font-medium text-sm px-4 py-2 transition-colors"
          >
            Iniciar sesión
          </a>
          <a
            routerLink="/register"
            class="bg-blue-700 hover:bg-blue-800 dark:bg-blue-600 dark:hover:bg-blue-700 text-white font-medium text-sm px-5 py-2.5 rounded-md transition-colors shadow-sm"
          >
            Registrarse
          </a>
        } @else {
          <span class="text-sm font-medium text-gray-700 dark:text-zinc-300 hidden sm:block">
            Hola, {{ authService.currentUser().name }}
          </span>

          @if (authService.currentUser().is_admin) {
            <a
              routerLink="/admin"
              class="text-blue-700 dark:text-blue-400 hover:text-blue-800 dark:hover:text-blue-300 font-medium text-sm px-4 py-2 transition-colors"
            >
              Panel Admin
            </a>
            <a
              routerLink="/admin/trips"
              class="text-blue-700 dark:text-blue-400 hover:text-blue-800 dark:hover:text-blue-300 font-medium text-sm px-4 py-2 transition-colors"
            >
              Gestión Viajes
            </a>
            <a
              routerLink="/admin/bookings"
              class="text-blue-700 dark:text-blue-400 hover:text-blue-800 dark:hover:text-blue-300 font-medium text-sm px-4 py-2 transition-colors"
            >
              Reservas
            </a>
          } @else {
            <a
              routerLink="/perfil"
              class="text-blue-700 dark:text-blue-400 hover:text-blue-800 dark:hover:text-blue-300 font-medium text-sm px-4 py-2 transition-colors"
            >
              Mi Perfil
            </a>
          }
          <a
            routerLink="/configuracion"
            class="text-blue-700 dark:text-blue-400 hover:text-blue-800 dark:hover:text-blue-300 font-medium text-sm px-4 py-2 transition-colors"
          >
            Configuración
          </a>

          <button
            (click)="onLogout()"
            class="text-gray-500 dark:text-zinc-400 hover:text-red-600 dark:hover:text-red-400 font-medium text-sm px-4 py-2 transition-colors"
          >
            Cerrar sesión
          </button>
        }
      </div>
    </div>
  </div>
</nav>
