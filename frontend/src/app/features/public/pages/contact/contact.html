<div class="max-w-4xl mx-auto px-4 py-16 sm:px-6 lg:px-8">
  <h1 class="text-4xl font-extrabold text-gray-900 mb-4">Contacto</h1>
  <p class="text-lg text-gray-500 mb-8">
    ¿Tienes alguna duda sobre tu reserva o quieres sugerir un destino? Escríbenos.
  </p>

  <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8">
    <form class="space-y-6">
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
        <div>
          <label class="block text-sm font-medium text-gray-700">Nombre</label>
          <input
            type="text"
            class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-lg shadow-sm focus:ring-blue-500 focus:border-blue-500"
          />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700">Correo</label>
          <input
            type="email"
            class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-lg shadow-sm focus:ring-blue-500 focus:border-blue-500"
          />
        </div>
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700">Mensaje</label>
        <textarea
          rows="4"
          class="mt-1 block w-full px-4 py-2 border border-gray-300 rounded-lg shadow-sm focus:ring-blue-500 focus:border-blue-500"
        ></textarea>
      </div>
      <button
        type="button"
        class="bg-blue-700 hover:bg-blue-800 text-white font-medium py-3 px-8 rounded-lg transition-colors"
      >
        Enviar Mensaje
      </button>
    </form>
  </div>
</div>
