<div class="min-h-[80vh] flex flex-col justify-center py-12 sm:px-6 lg:px-8 bg-gray-50">
  <div class="sm:mx-auto sm:w-full sm:max-w-md text-center">
    <div
      class="w-12 h-12 bg-blue-700 rounded-lg flex items-center justify-center text-white font-bold text-2xl shadow-sm mx-auto mb-4"
    >
      T
    </div>
    <h2 class="text-3xl font-extrabold text-gray-900">Crea tu cuenta</h2>
    <p class="mt-2 text-sm text-gray-600">
      ¿Ya tienes una cuenta?
      <a
        routerLink="/login"
        class="font-medium text-blue-600 hover:text-blue-500 transition-colors"
      >
        Inicia sesión aquí
      </a>
    </p>
  </div>

  <div class="mt-8 sm:mx-auto sm:w-full sm:max-w-md">
    <div class="bg-white py-8 px-4 shadow-sm border border-gray-100 sm:rounded-xl sm:px-10">
      <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="space-y-6">
        <div>
          <label for="name" class="block text-sm font-medium text-gray-700">Nombre completo</label>
          <div class="mt-1">
            <input
              id="name"
              type="text"
              formControlName="name"
              class="appearance-none block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm"
            />
          </div>
        </div>

        <div>
          <label for="email" class="block text-sm font-medium text-gray-700"
            >Correo electrónico</label
          >
          <div class="mt-1">
            <input
              id="email"
              type="email"
              formControlName="email"
              class="appearance-none block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm"
            />
          </div>
        </div>

        <div>
          <label for="password" class="block text-sm font-medium text-gray-700">Contraseña</label>
          <div class="mt-1">
            <input
              id="password"
              type="password"
              formControlName="password"
              class="appearance-none block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm"
            />
          </div>
          <p class="mt-1 text-xs text-gray-500">Debe tener al menos 8 caracteres.</p>
        </div>

        <div>
          <label for="password_confirmation" class="block text-sm font-medium text-gray-700"
            >Confirmar contraseña</label
          >
          <div class="mt-1">
            <input
              id="password_confirmation"
              type="password"
              formControlName="password_confirmation"
              class="appearance-none block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm"
            />
          </div>
        </div>

        @if (errorMessage()) {
          <div
            class="p-3 bg-red-50 text-red-700 border border-red-200 rounded-md text-sm text-center"
          >
            {{ errorMessage() }}
          </div>
        }

        <div>
          <button
            type="submit"
            [disabled]="registerForm.invalid || loading()"
            class="w-full flex justify-center py-2.5 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-blue-700 hover:bg-blue-800 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 disabled:bg-gray-400 disabled:cursor-not-allowed transition-colors"
          >
            @if (loading()) {
              Registrando...
            } @else {
              Registrarse
            }
          </button>
        </div>
      </form>
    </div>
  </div>
</div>
