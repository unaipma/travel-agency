<div class="min-h-[calc(100vh-4rem)] bg-white dark:bg-zinc-950 flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8 transition-colors duration-300">
  <div class="max-w-md w-full space-y-8 bg-white dark:bg-zinc-900 p-10 rounded-2xl shadow-xl dark:shadow-none border border-gray-100 dark:border-zinc-800 transition-colors">
    <div>
      <h2 class="mt-2 text-center text-3xl font-extrabold text-gray-900 dark:text-zinc-100 transition-colors">Iniciar sesión</h2>
      <p class="mt-2 text-center text-sm text-gray-600 dark:text-zinc-400 transition-colors">
        Accede a tu cuenta para gestionar tus reservas
      </p>
    </div>

    @if (!show2FA()) {
      <form class="mt-8 space-y-6" [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        <div class="space-y-4">
          <div>
            <label for="email" class="block text-sm font-medium text-gray-700 dark:text-zinc-300 transition-colors"
              >Correo electrónico</label
            >
            <input
              id="email"
              type="email"
              formControlName="email"
              class="mt-1 appearance-none relative block w-full px-4 py-3 border border-gray-300 dark:border-zinc-700 bg-white dark:bg-zinc-800 text-gray-900 dark:text-zinc-100 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 sm:text-sm transition-all"
            />
          </div>

          <div>
            <label for="password" class="block text-sm font-medium text-gray-700 dark:text-zinc-300 transition-colors">Contraseña</label>
            <input
              id="password"
              type="password"
              formControlName="password"
              class="mt-1 appearance-none relative block w-full px-4 py-3 border border-gray-300 dark:border-zinc-700 bg-white dark:bg-zinc-800 text-gray-900 dark:text-zinc-100 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 sm:text-sm transition-all"
            />
          </div>
        </div>

        @if (errorMessage) {
          <div
            class="text-red-700 text-sm text-center bg-red-50 border border-red-200 p-3 rounded-md"
          >
            {{ errorMessage }}
          </div>
        }

        <div>
          <button
            type="submit"
            [disabled]="loginForm.invalid"
            class="group relative w-full flex justify-center py-2 px-4 border border-transparent text-sm font-medium rounded-md text-white bg-blue-700 hover:bg-blue-800 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-700 disabled:bg-gray-400 disabled:cursor-not-allowed transition-colors"
          >
            Entrar
          </button>
        </div>
      </form>
    } @else {
      <div class="mt-8 space-y-6">
        <div>
          <p class="text-sm text-gray-600 dark:text-zinc-400 text-center mb-4 transition-colors">
            Introduce el código de 6 dígitos de tu aplicación de autenticación para continuar.
          </p>
          <input
            id="2fa-code"
            type="text"
            [ngModel]="twoFactorCode()"
            (ngModelChange)="twoFactorCode.set($event)"
            maxlength="6"
            placeholder="000000"
            class="mt-1 appearance-none relative block w-full px-3 py-4 border border-gray-300 dark:border-zinc-700 bg-white dark:bg-zinc-800 text-gray-900 dark:text-zinc-100 rounded-2xl focus:outline-none focus:ring-2 focus:ring-blue-500 text-center text-3xl font-mono tracking-widest transition-all"
          />
        </div>

        @if (errorMessage) {
          <div
            class="text-red-700 text-sm text-center bg-red-50 border border-red-200 p-3 rounded-md"
          >
            {{ errorMessage }}
          </div>
        }

        <div class="space-y-3">
          <button
            (click)="onVerify2FA()"
            [disabled]="twoFactorCode().length !== 6"
            class="w-full flex justify-center py-3 px-4 border border-transparent text-sm font-bold rounded-lg text-white bg-green-600 hover:bg-green-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-green-500 disabled:bg-gray-400 transition-colors"
          >
            Verificar Código
          </button>
          
          <button
            (click)="show2FA.set(false); errorMessage = ''"
            class="w-full text-sm text-gray-500 hover:text-gray-700 font-medium py-2"
          >
            Volver al inicio de sesión
          </button>
        </div>
      </div>
    }
  </div>
</div>
